name: Build libmpv-android

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a draft release of the build'
        required: false
        default: false
        type: boolean
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

permissions:
  contents: write

env:
  NDK_VER: 27.1.12297006

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Symlink SDK
        working-directory: ./buildscripts
        run: |
          mkdir -p sdk
          ln -sf ${ANDROID_HOME} ./sdk/android-sdk-linux

      - name: Bundle (default)
        working-directory: ./buildscripts
        env:
          FFMPEG_REPO: https://github.com/Ftak29/FFmpeg.git
          FFMPEG_REF: 1.0.0
        run: |
          set -euo pipefail
          sudo chmod +x bundle_default.sh
          ./bundle_default.sh

      - name: List outputs (debug)
        if: always()
        run: |
          echo "==== output/ ===="
          ls -la ./output || true
          echo "==== find AAR/JAR/SO ===="
          find . -maxdepth 8 -type f \( -name "*.aar" -o -name "*.jar" -o -name "libmpv.so" \) -print | sort || true

      - uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: |
            ./output/*.jar
            ./output/**/*.jar
            ./output/*.aar
            ./output/**/*.aar
            **/build/outputs/aar/*.aar
            **/jni/**/libmpv.so
            **/lib/**/libmpv.so
            **/libmpv.so

      - uses: softprops/action-gh-release@v1
        if: ${{ github.event.inputs.release == 'true' }}
        with:
          draft: true
          prerelease: false
          tag_name: "vnext"
          files: |
            output/*.jar
            output/**/*.jar
            output/*.aar
            output/**/*.aar
            **/build/outputs/aar/*.aar
